<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratul Howladar - AI Labs</title>
    <style>
        body {
            /* এআই ভাইব দেওয়ার জন্য ডিপ ভায়োলেট ও সায়ান-ব্লু মিক্সড কালার গ্রেডিয়েন্ট */
            background: radial-gradient(circle at top right, #1f003d, transparent 55%),
                        radial-gradient(circle at bottom left, #002244, transparent 55%),
                        #000000;
            background-attachment: fixed;
            color: #e2e2e2; 
            font-family: 'Georgia', serif; 
            padding: 60px 25px;
            max-width: 440px; /* লাইন লেন্থ লক যাতে এক লাইনে বেশি লেখা না ছড়ায় */
            margin: 0 auto;
            line-height: 1.8; 
            font-size: 20px; /* জুম ফিক্সড - লেখা স্পষ্ট আর বড় দেখাবে */
            position: relative;
            z-index: 1;
        }
        
        /* এআই নোড নেটওয়ার্ক ওয়াটারমার্ক - মিক্সড কালারে দারুণ ফুটে উঠবে */
        .ai-net-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0.08; /* একদম পারফেক্ট ভিজিবিলিটি, লেখার ক্ষতি করবে না */
            pointer-events: none;
            user-select: none;
        }
        
        h1 {
            font-size: 24px; 
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 35px;
        }
        
        h1 a {
            color: #ffffff;
            text-decoration: underline;
        }

        .section-title {
            font-size: 15px;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        p {
            margin-bottom: 22px;
            color: #dddddd;
        }

        a.back-link {
            color: #4da6ff; /* অ্যাসথেটিক ব্লু লিঙ্ক */
            text-decoration: underline;
            display: inline-block;
            margin-top: 25px;
        }

        a.back-link:hover {
            color: #80bfff;
        }

        .separator {
            text-align: center;
            margin-top: 45px;
            color: #444444;
            letter-spacing: 5px;
        }

        /* রেসপনসিভ জুম প্রোটেকশন */
        @media (max-width: 600px) {
            body {
                padding: 40px 20px;
                font-size: 19px; 
            }
        }
    </style>
</head>
<body>

    <div class="ai-net-watermark">
        <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <line x1="20%" y1="25%" x2="50%" y2="45%" stroke="#00f3ff" stroke-width="1.5" />
            <line x1="50%" y1="45%" x2="80%" y2="30%" stroke="#00ff66" stroke-width="1.5" />
            <line x1="50%" y1="45%" x2="40%" y2="75%" stroke="#00f3ff" stroke-width="1.5" />
            <line x1="40%" y1="75%" x2="75%" y2="80%" stroke="#00ff66" stroke-width="1.5" />
            <line x1="20%" y1="25%" x2="40%" y2="75%" stroke="#ffffff" stroke-width="1" stroke-dasharray="5,5" />
            
            <circle cx="20%" cy="25%" r="6" fill="#00f3ff" />
            <circle cx="50%" cy="45%" r="8" fill="#ffffff" />
            <circle cx="80%" cy="30%" r="5" fill="#00ff66" />
            <circle cx="40%" cy="75%" r="7" fill="#00f3ff" />
            <circle cx="75%" cy="80%" r="6" fill="#00ff66" />
        </svg>
    </div>

    <h1><a href="index.html">Ratul Howladar</a></h1>

    <div class="section-title">labs / generation</div>

    <p>
        Currently diving deep into the world of generative media and synthetic workflows.
    </p>

    <p>
        Focused on mastering image generating first, then moving into video. 
    </p>

    <a href="index.html" class="back-link">← Back</a>

    <div class="separator">***</div>

</body>
</html>
