<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratul Howlader — 4D Alien Nexus</title>

    <!-- 👽 Unreal-Level WebGL Render Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        /* 🌌 Zero-Gravity Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { display: none; } /* Hide scrollbars for alien look */

        body {
            background-color: #000000;
            color: #00f0ff; /* Alien Neon Cyan */
            font-family: "Courier New", Courier, monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Pushes UI to the bottom */
        }

        /* 🎥 4D Unreal Engine Viewport */
        #alienViewport {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* 🛸 HUD Targeting Scanner */
        .hud-scanner {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; height: 300px;
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.05);
        }
        .hud-scanner::before {
            content: ''; position: absolute;
            top: 50%; left: -20px; width: 340px; height: 1px;
            background: rgba(0, 240, 255, 0.2);
        }
        .hud-scanner::after {
            content: ''; position: absolute;
            left: 50%; top: -20px; height: 340px; width: 1px;
            background: rgba(0, 240, 255, 0.2);
        }

        /* 💻 The Mobile-Fixed Alien Console (Horizontal Layout) */
        .alien-console {
            width: 100%;
            padding: 20px 40px 40px 40px;
            display: flex;
            gap: 20px;
            overflow-x: auto; /* Horizontal Scroll */
            scroll-snap-type: x mandatory;
            z-index: 10;
            /* Gradient fade so it blends with deep space */
            background: linear-gradient(to top, rgba(0,0,5,0.9) 0%, rgba(0,0,0,0) 100%);
        }

        /* 💎 Anti-Gravity Data Panels */
        .cyber-card {
            flex: 0 0 320px; /* Fixed width for horizontal scrolling */
            scroll-snap-align: center;
            background: rgba(5, 10, 15, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-top: 2px solid #00f0ff;
            box-shadow: 0 10px 30px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(0, 240, 255, 0.05);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
            color: #00f0ff;
            transition: all 0.4s ease;
            position: relative;
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%); /* Sci-Fi Angled Corners */
        }

        .cyber-card:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: #ff003c; /* Alien Magenta Hover */
            border-top-color: #ff003c;
            box-shadow: 0 10px 40px rgba(255, 0, 60, 0.3), inset 0 0 20px rgba(255, 0, 60, 0.1);
            color: #ff003c;
            transform: translateY(-10px);
        }

        .card-id {
            position: absolute;
            top: 10px; left: 15px;
            font-size: 14px;
            color: rgba(0, 240, 255, 0.5);
            letter-spacing: 2px;
        }

        .card-title {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .card-desc {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
        }

        /* 🔗 Social Hub */
        .social-hub {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
        }

        .social-btn {
            background: transparent;
            color: #00f0ff;
            border: 1px solid #00f0ff;
            padding: 6px 12px;
            font-size: 10px;
            text-transform: uppercase;
            text-decoration: none;
            transition: 0.3s;
        }
        
        .social-btn:hover {
            background: #ff003c;
            color: #000;
            border-color: #ff003c;
            box-shadow: 0 0 15px #ff003c;
        }

        /* 📱 Mobile Target Overrides */
        @media (max-width: 768px) {
            .alien-console {
                padding: 10px 20px 20px 20px;
                gap: 15px;
            }
            .cyber-card {
                flex: 0 0 260px; /* Smaller cards for mobile */
                padding: 25px 15px;
            }
            .hud-scanner {
                width: 200px; height: 200px;
            }
        }
    </style>
</head>
<body>

    <!-- 🎥 4D Render Engine Canvas -->
    <canvas id="alienViewport"></canvas>
    
    <!-- Targeting HUD -->
    <div class="hud-scanner"></div>

    <!-- 💻 Horizontal Dock / Console (THE MOBILE FIX) -->
    <!-- This sits at the bottom, leaving the entire top screen for the 3D space! -->
    <div class="alien-console" id="ui-dock">
        
        <!-- 01. About -->
        <a href="about.html" class="cyber-card">
            <span class="card-id">SYS.01</span>
            <div class="card-title">About Me</div>
            <div class="card-desc">Entity Bio-Data</div>
        </a>

        <!-- 02. Connect -->
        <div class="cyber-card">
            <span class="card-id">SYS.02</span>
            <div class="card-title">Comm-Link</div>
            <div class="social-hub">
                <a href="https://www.facebook.com/share/194iqWJxyf/" target="_blank" class="social-btn">FB</a>
                <a href="https://www.linkedin.com/in/ratul-howladar-82b720418" target="_blank" class="social-btn">IN</a>
                <a href="#" target="_blank" class="social-btn">GIT</a>
                <a href="https://www.instagram.com/judgeroronoa?igsh=MXRzZTZ3eTAzMDF1cg==" target="_blank" class="social-btn">IG</a>
                <a href="https://wa.me/8801926548174" target="_blank" class="social-btn">WA</a>
            </div>
        </div>

        <!-- 03. Education -->
        <a href="education.html" class="cyber-card">
            <span class="card-id">SYS.03</span>
            <div class="card-title">Education</div>
            <div class="card-desc">Neural Training</div>
        </a>

        <!-- 04. AI Projects -->
        <a href="ai_projects.html" class="cyber-card">
            <span class="card-id">SYS.04</span>
            <div class="card-title">AI Projects</div>
            <div class="card-desc">Machine Logic</div>
        </a>

        <!-- 05. Music Bands -->
        <a href="music.html" class="cyber-card">
            <span class="card-id">SYS.05</span>
            <div class="card-title">Acoustics</div>
            <div class="card-desc">Sonic Frequencies</div>
        </a>

    </div>

    <script>
        // 🧠 4D EINSTEIN LEVEL PROCEDURAL RENDERING ENGINE
        let scene, camera, renderer, tesseract, ufoArmada = [], warpStars;
        
        // Touch/Mouse Matrix
        let targetX = 0, targetY = 0;

        function init4DEngine() {
            // 1. Core Dimensions
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.0015); // Alien atmospheric fog

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.z = 400;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('alienViewport'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // 2. Extraterrestrial Lighting
            const ambient = new THREE.AmbientLight(0x001133, 2);
            scene.add(ambient);
            const coreLight = new THREE.PointLight(0x00f0ff, 3, 800);
            coreLight.position.set(0, 0, 0);
            scene.add(coreLight);

            // 3. 🌀 The 4D Tesseract (Hypercube Illusion)
            // Creating a complex alien geometric core
            const tessGroup = new THREE.Group();
            
            // Outer Geometry
            const geoOuter = new THREE.IcosahedronGeometry(60, 1);
            const matOuter = new THREE.MeshBasicMaterial({ color: 0x00f0ff, wireframe: true, transparent: true, opacity: 0.3 });
            const meshOuter = new THREE.Mesh(geoOuter, matOuter);
            
            // Inner Geometry (4th Dimensional shift)
            const geoInner = new THREE.OctahedronGeometry(35, 0);
            const matInner = new THREE.MeshStandardMaterial({ color: 0xff003c, metalness: 1, roughness: 0.2, emissive: 0xff003c, emissiveIntensity: 0.5 });
            const meshInner = new THREE.Mesh(geoInner, matInner);

            tessGroup.add(meshOuter);
            tessGroup.add(meshInner);
            scene.add(tessGroup);
            tesseract = tessGroup;

            // 4. 🛸 Procedural Alien Airships (UFO Generator)
            // Einstein Top Coder Trick: Creating ships from math without external files!
            for(let i = 0; i < 15; i++) {
                const ufo = createAlienShip();
                // Random spawn positions in deep space
                ufo.position.set(
                    (Math.random() - 0.5) * 1200,
                    (Math.random() - 0.5) * 600,
                    (Math.random() - 0.5) * -2000 - 500 // Spawn far behind
                );
                // Assign random warp speed
                ufo.userData = { speed: Math.random() * 8 + 4, sway: Math.random() * 0.05 };
                ufoArmada.push(ufo);
                scene.add(ufo);
            }

            // 5. 🚀 Hyper-Warp Starfield (Unreal Engine Speed Trails)
            const starGeo = new THREE.BufferGeometry();
            const starCount = 4000;
            const starPos = new Float32Array(starCount * 3);
            for(let i=0; i < starCount * 3; i++) {
                starPos[i] = (Math.random() - 0.5) * 2000;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            
            // By scaling points on the Z axis, we create speed lines!
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, transparent: true, opacity: 0.8 });
            warpStars = new THREE.Points(starGeo, starMat);
            scene.add(warpStars);
        }

        // 🛸 Mathematical UFO Construction Function
        function createAlienShip() {
            const group = new THREE.Group();
            
            // Hull (Flattened Sphere)
            const hullGeo = new THREE.SphereGeometry(15, 32, 16);
            hullGeo.scale(1, 0.25, 1); // Squish it into a flying saucer
            const hullMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
            const hull = new THREE.Mesh(hullGeo, hullMat);

            // Energy Ring (Glowing Cyan)
            const ringGeo = new THREE.TorusGeometry(18, 0.8, 16, 100);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x00f0ff });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;

            // Engine Core (Glowing Magenta)
            const coreGeo = new THREE.CylinderGeometry(5, 5, 10, 32);
            const coreMat = new THREE.MeshBasicMaterial({ color: 0xff003c });
            const core = new THREE.Mesh(coreGeo, coreMat);

            group.add(hull);
            group.add(ring);
            group.add(core);
            
            // Tilt for dynamic flight pose
            group.rotation.x = Math.PI * 0.1; 
            return group;
        }

        // 🕹️ Parallax Interaction Sensors
        function handleMove(clientX, clientY) {
            targetX = (clientX / window.innerWidth) * 2 - 1;
            targetY = -(clientY / window.innerHeight) * 2 + 1;
        }
        document.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        document.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) handleMove(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: true});

        // ⚙️ 4D Space-Time Computational Loop
        let clock = new THREE.Clock();

        function animate() {
            const time = clock.getElapsedTime();

            // 1. Camera Parallax (Look around the universe)
            camera.position.x += (targetX * 150 - camera.position.x) * 0.05;
            camera.position.y += (targetY * 150 - camera.position.y) * 0.05;
            camera.lookAt(0, 0, -200);

            // 2. 4D Tesseract Rotation (Complex multi-axis)
            tesseract.rotation.x = time * 0.2;
            tesseract.rotation.y = time * 0.3;
            tesseract.children[1].rotation.z = time * -0.5; // Inner core spins backward
            tesseract.children[1].scale.setScalar(1 + Math.sin(time * 2) * 0.1); // Breathing effect

            // 3. Alien Armada Hyper-Flight Mechanics
            ufoArmada.forEach((ufo, index) => {
                // Fly towards the camera on Z axis
                ufo.position.z += ufo.userData.speed;
                // Evasive sine-wave swaying maneuvers
                ufo.position.x += Math.sin(time * 2 + index) * 2;
                ufo.position.y += Math.cos(time * 1.5 + index) * 1.5;
                // Spin the energy ring
                ufo.children[1].rotation.z += 0.05;

                // If ship flies past camera, respawn deep in space
                if (ufo.position.z > 500) {
                    ufo.position.z = -2000;
                    ufo.position.x = (Math.random() - 0.5) * 1200;
                    ufo.position.y = (Math.random() - 0.5) * 600;
                }
            });

            // 4. Warp-Drive Starfield Acceleration
            const positions = warpStars.geometry.attributes.position.array;
            for(let i = 0; i < positions.length; i += 3) {
                positions[i+2] += 15; // Unbelievable speed
                if(positions[i+2] > 500) {
                    positions[i+2] = -2000;
                }
            }
            warpStars.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        // Elastic Dimensional Resizer
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Ignite Unreal Engines
        init4DEngine();
        animate();
    </script>
</body>
</html>
