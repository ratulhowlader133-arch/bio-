<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratul Howlader — 3D Cinematic Universe</title>
    <style>
        /* গ্লোবাল রিসেট ও সিনেমাটিক সেটআপ */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #030206;
            color: #ffffff;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px; /* এক্সট্রিম থ্রিডি ডেপথ */
        }

        /* হাই-কোয়ালিটি ৩ডি হাইপারস্পেস ক্যানভাস */
        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -2;
            background: #020205;
        }

        /* নিয়ন রেড অ্যাম্বিয়েন্ট লাইট গ্লো */
        .ambient-mesh {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 30, 70, 0.12) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        /* টপ ফিউচারিস্টিক বার */
        .cyber-hud {
            position: absolute;
            top: 40px; left: 50%;
            transform: translateX(-50%) translateZ(100px);
            font-family: monospace;
            font-size: 11px;
            color: rgba(255, 30, 70, 0.9);
            letter-spacing: 5px;
            text-transform: uppercase;
            background: rgba(255, 30, 70, 0.05);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 30, 70, 0.3);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 30, 70, 0.2);
            text-shadow: 0 0 8px rgba(255, 30, 70, 0.8);
            z-index: 10;
        }

        /* মেইন ৩ডি ডাইনামিক গ্রিড */
        .matrix-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 35px;
            width: 90%;
            max-width: 1200px;
            transform-style: preserve-3d;
            z-index: 1;
            padding: 120px 0 60px 0;
            transition: transform 0.1s ease-out;
        }

        /* 🔥 প্রিমিয়াম নিয়ন ক্রিমসন রেড বডি কার্ড (যা ব্যাকগ্রাউন্ডে চমৎকার ফুটবে) */
        .cyber-card {
            /* কার্ডের ভেতরের মেইন বডি কালার এখন একটি লাক্সারি ডার্ক রেড গ্রেডিয়েন্ট */
            background: linear-gradient(135deg, rgba(230, 15, 55, 0.18) 0%, rgba(15, 3, 8, 0.85) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 30, 70, 0.25);
            border-top: 1px solid rgba(255, 50, 90, 0.6); 
            border-radius: 24px;
            padding: 45px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
            color: #fff;
            position: relative;
            transform-style: preserve-3d;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            
            /* অ্যান্টি-গ্র্যাভিটি লেভিটেশন */
            animation: antiGravity 7s ease-in-out infinite;
        }

        /* কার্ডগুলোর মুভমেন্ট সিঙ্ক ব্রেক করা */
        .c-1 { animation-delay: 0s; }
        .c-2 { animation-delay: -3.5s; }
        .c-3 { animation-delay: -1.8s; }
        .c-4 { animation-delay: -5.2s; }
        .c-5 { animation-delay: -2.5s; }

        @keyframes antiGravity {
            0%, 100% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-20px) rotateX(2deg); }
        }

        /* হোভার করলে সলিড ভাইব্রেন্ট রেড গ্লো এবং থ্রিডি পুশ এফেক্ট */
        .cyber-card:hover, .cyber-card:active {
            background: linear-gradient(135deg, rgba(255, 20, 60, 0.3) 0%, rgba(25, 2, 6, 0.9) 100%);
            border-color: rgba(255, 30, 70, 0.8);
            border-top: 1px solid #ff1e46;
            box-shadow: 0 40px 80px rgba(255, 20, 60, 0.25), 
                        0 0 40px rgba(255, 20, 60, 0.4), 
                        inset 0 0 20px rgba(255, 20, 60, 0.2);
            transform: scale(1.05) translateZ(70px) !important; 
            animation-play-state: paused; 
        }

        /* ব্যাকগ্রাউন্ড ইনডেক্স নাম্বার */
        .card-id {
            font-family: monospace;
            font-size: 70px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.015);
            position: absolute;
            top: 10px; left: 20px;
            transform: translateZ(-20px);
            pointer-events: none;
            transition: color 0.4s;
        }
        .cyber-card:hover .card-id, .cyber-card:active .card-id {
            color: rgba(255, 30, 70, 0.05);
        }

        /* টাইপোগ্রাফি এবং টেক্সট গ্লো */
        .card-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 12px;
            background: linear-gradient(180deg, #ffffff 0%, #dddddd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(30px); 
            transition: all 0.4s;
        }
        
        .cyber-card:hover .card-title, .cyber-card:active .card-title {
            background: linear-gradient(180deg, #ffffff 0%, #ff325a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(255, 30, 70, 0.6);
        }

        .card-desc {
            font-size: 13px;
            color: #888;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            transform: translateZ(20px);
            transition: color 0.4s;
        }
        .cyber-card:hover .card-desc, .cyber-card:active .card-desc {
            color: #ff325a;
        }

        /* সোশ্যাল মিডিয়া হাব প্যানেল */
        .social-hub {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            transform: translateZ(35px); 
            flex-wrap: wrap;
            justify-content: center;
            max-width: 320px;
        }

        .social-link-btn {
            background: rgba(255, 30, 70, 0.08);
            color: #ff325a;
            text-decoration: none;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 30, 70, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .social-link-btn:hover {
            background: #ff325a;
            color: #020205;
            box-shadow: 0 0 20px #ff325a, 0 0 40px rgba(255, 30, 70, 0.6);
            transform: translateY(-3px);
        }

        /* মোবাইল অপটিমাইজেশন */
        @media (max-width: 650px) {
            .matrix-container { gap: 20px; padding-top: 100px; }
            .cyber-card { padding: 35px 20px; }
            .card-title { font-size: 20px; }
        }
    </style>

<body>

    <script>
        // ১. রিয়েল-টাইম ডেট জেনারেটর
        const dateObj = new Date();
        document.getElementById('hud-date').innerText = `SYSTEM SYNC // ${dateObj.toISOString().split('T')[0].replace(/-/g, '.')}`;

        // ২. মাউস ট্র্যাকিং অ্যাম্বিয়েন্ট লাইট এবং ৩ডি প্যারালাক্স এফেক্ট
        const grid = document.getElementById('space-grid');
        const glow = document.getElementById('meshGlow');
        let speedMultiplier = 1;

        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            grid.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;

            const xPercent = (e.clientX / window.innerWidth) * 100;
            const yPercent = (e.clientY / window.innerHeight) * 100;
            glow.style.setProperty('--mouse-x', `${xPercent}%`);
            glow.style.setProperty('--mouse-y', `${yPercent}%`);

            speedMultiplier = 4.5; // মাউস নাড়ালে ব্যাকগ্রাউন্ড ট্রাভেল স্পিড বেড়ে যাবে
        });

        document.addEventListener('mouseleave', () => {
            grid.style.transform = `rotateY(0deg) rotateX(0deg)`;
            speedMultiplier = 1;
        });

        // ৩. 🔥 হাই-কোয়ালিটি সিনেমাটিক "স্টার-স্ট্রিক" হাইপারড্রাইভ ক্যানভাস ইঞ্জিন
        const canvas = document.getElementById("warpCanvas");
        const ctx = canvas.getContext("2d");

        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setCanvasSize();

        let stars = [];
        const numStars = 180; // নিখুঁত ডেনসিটি

        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * canvas.width - canvas.width / 2,
                y: Math.random() * canvas.height - canvas.height / 2,
                z: Math.random() * canvas.width,
                // থিমের সাথে ম্যাচ করে কিছু স্ট্রিক নিয়ন রেড আর কিছু পিউর হোয়াইট
                color: Math.random() > 0.75 ? 'rgba(255, 30, 70, 0.85)' : 'rgba(255, 255, 255, 0.75)'
            });
        }

        function animateWarp() {
            // হালকা ট্রেইল ইফেক্টের জন্য স্মুথ ক্লিয়ারিং ব্যাকগ্রাউন্ড
            ctx.fillStyle = 'rgba(2, 2, 5, 0.18)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            for (let i = 0; i < stars.length; i++) {
                let star = stars[i];
                
                // আগের পজিশন স্টোর করা হচ্ছে স্ট্রিক (লম্বা লাইন) বানানোর জন্য
                let old_z = star.z;
                
                star.z -= 3.5 * speedMultiplier; 

                if (star.z <= 0) {
                    star.z = canvas.width;
                    star.x = Math.random() * canvas.width - cx;
                    star.y = Math.random() * canvas.height - cy;
                    old_z = star.z;
                }

                // কারেন্ট পজিশন প্রজেকশন
                let px = (star.x / star.z) * canvas.width + cx;
                let py = (star.y / star.z) * canvas.height + cy;
                
                // আগের পজিশন প্রজেকশন (স্ট্রিক লাইন টানার জন্য)
                let opx = (star.x / old_z) * canvas.width + cx;
                let opy = (star.y / old_z) * canvas.height + cy;

                let size = (1 - star.z / canvas.width) * 2.5;

                if (px >= 0 && px <= canvas.width && py >= 0 && py <= canvas.height) {
                    ctx.strokeStyle = star.color;
                    ctx.lineWidth = size;
                    ctx.lineCap = "round";
                    
                    // সস্তা ডটের বদলে সিনেমাটিক লাইট রেখা/স্ট্রিক ড্রয়িং
                    ctx.beginPath();
                    ctx.moveTo(opx, opy);
                    ctx.lineTo(px, py);
                    ctx.stroke();
                }
            }
            requestAnimationFrame(animateWarp);
        }

        window.addEventListener('resize', () => {
            setCanvasSize();
        });

        animateWarp();
    </script>
</body>
