<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratul Howladar — Core</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #030305;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
            overflow-x: hidden;
            padding: 20px;
        }

        .ambient-glow {
            position: fixed;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(80px);
        }

        .grid-3d {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 900px;
            transform-style: preserve-3d;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: 0.5s;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-25px); }
        }

        /* কার্ডগুলোর মুভমেন্ট যেন আলাদা হয় */
        .card:nth-child(even) { animation-delay: -3s; }
        .card:nth-child(3n) { animation-delay: -1.5s; }

        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 243, 255, 0.5);
            transform: scale(1.05) translateZ(30px);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        h2 { margin-bottom: 10px; color: #00f3ff; letter-spacing: 2px; }
        p { color: #aaa; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        .header-bar {
            position: fixed;
            top: 30px;
            color: #555;
            font-size: 12px;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <div class="header-bar" id="live-date">LOADING...</div>

    <div class="grid-3d">
        <!-- ১. About Me -->
        <a href="about.html" class="card">
            <h2>01</h2>
            <p>ABOUT ME</p>
        </a>
        <!-- ২. Connect -->
        <a href="connect.html" class="card">
            <h2>02</h2>
            <p>CONNECT</p>
        </a>
        <!-- ৩. Education -->
        <a href="education.html" class="card">
            <h2>03</h2>
            <p>EDUCATION</p>
        </a>
        <!-- ৪. AI Projects -->
        <a href="ai_projects.html" class="card">
            <h2>04</h2>
            <p>AI PROJECTS</p>
        </a>
        <!-- ৫. Music Bands -->
        <a href="music.html" class="card">
            <h2>05</h2>
            <p>MUSIC BANDS</p>
        </a>
    </div>

    <script>
        const d = new Date();
        document.getElementById('live-date').innerText = d.toISOString().split('T')[0].replace(/-/g, '.');
    </script>
</body>
</html>
