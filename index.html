    <style>
        /* Global Minimalist Reset & Spatial Framework */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #020204; /* Pure Absolute Cosmic Void */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1500px; /* Refined Real-world Focal Length */
        }

        /* Cinema-Grade Space Time Warp Canvas */
        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -2;
            background: #010103;
        }

        /* Subtle Relativistic Lens Flare Mesh */
        .ambient-mesh {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 255, 255, 0.03) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        /* Minimalist High-End HUD Navigation */
        .cyber-hud {
            position: absolute;
            top: 40px; left: 50%;
            transform: translateX(-50%) translateZ(80px);
            font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 6px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.02);
            padding: 10px 24px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            z-index: 10;
        }

        /* Sophisticated Responsive Monolithic Layout */
        .matrix-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            width: 90%;
            max-width: 1200px;
            transform-style: preserve-3d;
            z-index: 1;
            padding: 140px 0 80px 0;
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Premium Monolithic Obsidian / Dark Titanium Cards */
        .cyber-card {
            /* High Contrast Solid Dark Base to isolate from Space Background */
            background: #111216; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 50px 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
            color: #fff;
            position: relative;
            transform-style: preserve-3d;
            /* Multi-layered shadows for massive architectural density */
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9),
                        inset 0 1px 1px rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            
            /* Organic micro-floating motion instead of erratic waves */
            animation: spatialDrift 8s ease-in-out infinite;
        }

        /* Asynchronous Easing Breaks */
        .c-1 { animation-delay: 0s; }
        .c-2 { animation-delay: -3.2s; }
        .c-3 { animation-delay: -1.6s; }
        .c-4 { animation-delay: -4.8s; }
        .c-5 { animation-delay: -2.4s; }

        @keyframes spatialDrift {
            0%, 100% { transform: translateY(0px) rotateY(0deg); }
            50% { transform: translateY(-12px) rotateY(1deg); }
        }

        /* Ultra-Clean Micro-interactions on Hover */
        .cyber-card:hover, .cyber-card:active {
            background: #15171e;
            border-color: rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            box-shadow: 0 60px 100px rgba(0, 0, 0, 0.95),
                        0 0 40px rgba(255, 255, 255, 0.05);
            transform: scale(1.03) translateZ(80px) !important;
            animation-play-state: paused;
        }

        /* Architectural Structural ID */
        .card-id {
            font-family: SFMono-Regular, Consolas, monospace;
            font-size: 50px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.02);
            position: absolute;
            top: 15px; left: 25px;
            transform: translateZ(-10px);
            pointer-events: none;
            transition: color 0.4s;
        }
        .cyber-card:hover .card-id, .cyber-card:active .card-id {
            color: rgba(255, 255, 255, 0.05);
        }

        /* Premium Typography Layout */
        .card-title {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 14px;
            color: #ffffff;
            transform: translateZ(30px);
            transition: color 0.3s;
        }

        .card-desc {
            font-size: 12px;
            color: #66666e;
            font-family: SFMono-Regular, Consolas, monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            transform: translateZ(15px);
            transition: color 0.3s;
        }
        .cyber-card:hover .card-desc, .cyber-card:active .card-desc {
            color: #ffffff;
        }

        /* Social Connection Hub Minimal Panel */
        .social-hub {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            transform: translateZ(40px);
            flex-wrap: wrap;
            justify-content: center;
            max-width: 340px;
        }

        .social-link-btn {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-family: SFMono-Regular, Consolas, monospace;
            font-size: 11px;
            font-weight: 500;
            padding: 10px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .social-link-btn:hover {
            background: #ffffff;
            color: #020204;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Fluid Mobile Breakpoints */
        @media (max-width: 650px) {
            .matrix-container { gap: 24px; padding-top: 120px; }
            .cyber-card { padding: 40px 24px; }
            .card-title { font-size: 21px; }
        }
    </style>
</head>
<body>

    <canvas id="warpCanvas"></canvas>
    <div class="ambient-mesh" id="meshGlow"></div>

        <a href="music.html" class="cyber-card c-5">

            <div class="card-desc">Sound & Favourites</div>

    <script>
        // Real-time Epoch/Date HUD Synchronizer
        const dateObj = new Date();
        document.getElementById('hud-date').innerText = `CHRONO CORE // ${dateObj.toISOString().split('T')[0].replace(/-/g, '.')}`;

        // Smooth Physics Matrix Interactivity Engine
        const grid = document.getElementById('space-grid');
        const glow = document.getElementById('meshGlow');
        
        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;
        let targetSpeed = 1;
        let currentSpeed = 1;

        document.addEventListener('mousemove', (e) => {
            // Relational positioning calculations for 3D grid tilt
            targetX = (window.innerWidth / 2 - e.pageX) / 55;
            targetY = (window.innerHeight / 2 - e.pageY) / 55;

            // Fluid UI Lens Calculations
            const xPercent = (e.clientX / window.innerWidth) * 100;
            const yPercent = (e.clientY / window.innerHeight) * 100;
            glow.style.setProperty('--mouse-x', `${xPercent}%`);
            glow.style.setProperty('--mouse-y', `${yPercent}%`);

            targetSpeed = 7; // Warp speed increases under gravitational velocity (mouse motion)
        });

        document.addEventListener('mouseleave', () => {
            targetX = 0;
            targetY = 0;
            targetSpeed = 1;
        });

        // 3D Relativistic Hyperdrive Starfield Simulation (Strict Depth Projection Geometry)
        const canvas = document.getElementById("warpCanvas");
        const ctx = canvas.getContext("2d");

        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setCanvasSize();

        let stars = [];
        const numStars = 250; // Perfectly balanced celestial density
        const fov = 400; // Realistic mathematical field of view

        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * canvas.width * 2 - canvas.width,
                y: Math.random() * canvas.height * 2 - canvas.height,
                z: Math.random() * canvas.width,
                brightness: Math.random() * 0.4 + 0.6 // Eliminating raw blinding whites
            });
        }

        function animateWarp() {
            // Inertial interpolations for buttery smooth motion blur & lag-free stabilization
            currentX += (targetX - currentX) * 0.08;
            currentY += (targetY - currentY) * 0.08;
            currentSpeed += (targetSpeed - currentSpeed) * 0.05;

            grid.style.transform = `rotateY(${-currentX}deg) rotateX(${currentY}deg)`;

            // Deep Space Black with a very low alpha trail multiplier for cinematic organic stretch
            ctx.fillStyle = 'rgba(2, 2, 4, 0.12)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            for (let i = 0; i < stars.length; i++) {
                let star = stars[i];
                
                let old_z = star.z;
                star.z -= currentSpeed * 2.8; // Relativistic structural displacement

                // Boundaries reset mapping to endless loop recursion
                if (star.z <= 0) {
                    star.z = canvas.width;
                    star.x = Math.random() * canvas.width * 2 - cx;
                    star.y = Math.random() * canvas.height * 2 - cy;
                    old_z = star.z;
                }

                // Complex Math Spatial Projection mapping coordinates from 3D space vectors into 2D screenspace
                let px = (star.x / star.z) * fov + cx;
                let py = (star.y / star.z) * fov + cy;
                
                let opx = (star.x / old_z) * fov + cx;
                let opy = (star.y / old_z) * fov + cy;

                // Fading luminosity vector according to relative scale (z-depth)
                let alpha = (1 - star.z / canvas.width) * star.brightness;
                let strokeSize = (1 - star.z / canvas.width) * 2;

                if (px >= 0 && px <= canvas.width && py >= 0 && py <= canvas.height) {
                    // Soft high-end organic cosmic white/ice blue mix instead of solid neon
                    ctx.strokeStyle = `rgba(235, 245, 255, ${alpha})`;
                    ctx.lineWidth = strokeSize;
                    ctx.lineCap = "round";
                    
                    ctx.beginPath();
                    ctx.moveTo(opx, opy);
                    ctx.lineTo(px, py);
                    ctx.stroke();
                }
            }
            requestAnimationFrame(animateWarp);
        }

        window.addEventListener('resize', () => {
            setCanvasSize();
        });

        animateWarp();
    </script>
</body>
