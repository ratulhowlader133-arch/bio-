<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratul Howladar — Quantum Core</title>
    <style>
        body {
            /* কালারফুল এআই আভা দেওয়ার জন্য ডিপ ভায়োলেট ও সায়ান-ব্লু মিক্সড গ্রেডিয়েন্ট */
            background: radial-gradient(circle at top left, #1c0024, transparent 60%),
                        radial-gradient(circle at bottom right, #001a33, transparent 60%),
                        #000000; /* বেস পিচ ব্ল্যাক */
            background-attachment: fixed;
            color: #e0e0e0;
            font-family: 'Georgia', serif;
            padding: 50px 25px 80px 25px;
            max-width: 460px; /* লাইন লেন্থ লক */
            margin: 0 auto;
            line-height: 1.8;
            font-size: 20px; /* জুম ফিক্সড - একদম স্পষ্ট আর বড় দেখাবে */
            position: relative;
            z-index: 1;
            overflow-x: hidden;
        }

        /* হোয়াইট অ্যান্ড ব্ল্যাক গথিক এসভিজি ওয়াটারমার্ক */
        .gothic-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0.04; 
            pointer-events: none;
            user-select: none;
        }

        /* 3D Cinematic Entry Wrapper - পুরো ইন্টারফেস গভীর থেকে সামনে আসবে */
        .view-frame {
            transform: perspective(1200px) translateZ(-150px) translateY(20px);
            opacity: 0;
            animation: cinematicEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cinematicEntrance {
            to {
                transform: perspective(1200px) translateZ(0) translateY(0);
                opacity: 1;
            }
        }

        /* টপ লেভেল সিস্টেম ড্যাশবোর্ড বার */
        .sys-dashboard {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 11px;
            color: #666666;
            border-bottom: 1px solid #222222;
            padding-bottom: 8px;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .sys-status-active {
            color: #00ff66; /* প্রফেশনাল গ্রিন */
        }

        h1 {
            font-size: 28px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 5px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 14px;
            color: #888888;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        /* ডিরেক্টরি ট্রি কন্টেইনার */
        .tree-container {
            margin: 30px 0 50px 0;
            line-height: 1.9;
        }

        /* টাইপিং অ্যানিমেশন প্রম্পট */
        .tree-root-wrapper {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid #00f3ff; /* টাইপিং কার্সার */
            font-family: monospace;
            color: #aaaaaa;
            font-size: 16px;
            letter-spacing: 1px;
            margin-bottom: 15px;
            width: 0;
            animation: typeCommand 1s steps(30, end) 1s forwards,
                       blinkCursor 0.8s step-end infinite;
        }

        @keyframes typeCommand {
            to { width: 100%; border-right-color: transparent; }
        }
        @keyframes blinkCursor {
            from, to { border-right-color: transparent }
            50% { border-right-color: #00f3ff; }
        }

        /* ডিরেক্টরি ট্রি লাইন এবং ক্যাসকেড অ্যানিমেশন (একটি পর একটি নামবে) */
        .tree-line {
            margin-bottom: 8px;
            font-family: monospace;
            white-space: nowrap;
            opacity: 0;
            transform: translateY(8px);
            animation: cascadeSpawn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cascadeSpawn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ট্রি লাইনের স্ট্যাগার্ড ডিলে (বিল্ড সিকোয়েন্স) */
        .tl-1 { animation-delay: 1.8s; }
        .tl-2 { animation-delay: 1.9s; }
        .tl-3 { animation-delay: 2.0s; }
        .tl-4 { animation-delay: 2.1s; }
        .tl-5 { animation-delay: 2.2s; }
        .tl-6 { animation-delay: 2.3s; }
        .tl-7 { animation-delay: 2.4s; }
        .tl-8 { animation-delay: 2.5s; }

        .tree-char {
            color: #444444;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .tree-folder {
            color: #888888;
            font-weight: bold;
            font-family: monospace;
            font-size: 17px;
        }

        .file-meta {
            font-size: 12px;
            color: #555555;
            font-family: monospace;
            margin-left: 6px;
        }

        a {
            color: #4da6ff; /* ইলেকট্রিক ব্লু */
            text-decoration: underline;
            font-family: 'Georgia', serif;
            font-size: 20px;
        }

        a:hover {
            color: #80bfff;
        }

        .separator {
            text-align: center;
            margin-top: 50px;
            color: #333333;
            letter-spacing: 5px;
        }

        /* রেসপনসিভ জুম প্রোটেকশন */
        @media (max-width: 600px) {
            body {
                padding: 50px 20px 60px 20px;
                font-size: 19px;
            }
            .tree-line a {
                font-size: 19px;
            }
        }
    </style>
</head>
<body>

    <!-- গথিক হোয়াইট অ্যান্ড ব্ল্যাক ওয়াটারমার্ক ব্যাকগ্রাউন্ড -->
    <div class="gothic-watermark">
        <svg width="100%" height="100%" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
            <path d="M 400,50 L 400,750 M 100,320 L 700,320" stroke="#ffffff" stroke-width="2" />
            <polygon points="400,100 460,320 400,700 340,320" fill="none" stroke="#ffffff" stroke-width="1.5" />
            <circle cx="400" cy="320" r="120" fill="none" stroke="#ffffff" stroke-width="1.5" />
            <circle cx="400" cy="320" r="200" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="6,6" />
            <path d="M 400,320 L 230,150 M 400,320 L 570,150 M 400,320 L 230,490 M 400,320 L 570,490" stroke="#ffffff" stroke-width="1" />
        </svg>
    </div>

    <!-- 3D অ্যানিমেশন ফ্রেম শুরু -->
    <div class="view-frame">

        <!-- সিস্টেম ড্যাশবোর্ড বার -->
        <div class="sys-dashboard">
            <div>SYS: <span class="sys-status-active">ONLINE</span></div>
            <div>LOC: DHAKA // BD</div>
            <div>2026.06.26</div>
        </div>

        <h1>Ratul Howladar</h1>
        <div class="subtitle">personal directory / v1.0</div>

        <!-- মাল্টি-লেভেল টার্মিনাল ডিরেক্টরি ট্রি -->
        <div class="tree-container">
            <!-- অটোমেটিক টাইপিং প্রম্পট লাইন -->
            <div class="tree-root-wrapper">ratul@neural_core:~$ tree --meta</div>
            
            <!-- ফোল্ডার এবং ফাইলে ঠাসা অপশন সিকোয়েন্স (স্ট্যাগার্ড ক্যাসকেড লোড) -->
            <div class="tree-line tl-1"><span class="tree-char">├── </span><span class="tree-folder">core/</span></div>
            <div class="tree-line tl-2"><span class="tree-char">│   └── </span><a href="about.html">about.html</a><span class="file-meta">[3.8kb]</span></div>
            
            <div class="tree-line tl-3"><span class="tree-char">├── </span><span class="tree-folder">connect/</span></div>
            <div class="tree-line tl-4"><span class="tree-char">│   └── </span><a href="social_media.html">socials.html</a><span class="file-meta">[4.2kb]</span></div>
            
            <div class="tree-line tl-5"><span class="tree-char">├── </span><span class="tree-folder">archive/</span></div>
            <div class="tree-line tl-6"><span class="tree-char">│   └── </span><a href="education.html">education.html</a><span class="file-meta">[5.1kb]</span></div>
            
            <div class="tree-line tl-7"><span class="tree-char">└── </span><span class="tree-folder">workspace/</span></div>
            <div class="tree-line tl-8"><span class="tree-char">    ├── </span><a href="music.html">music.html</a><span class="file-meta">[6.7kb]</span></div>
            <div class="tree-line tl-8"><span class="tree-char">    └── </span><a href="ai_projects.html">ai_projects.html</a><span class="file-meta">[3.5kb]</span></div>
        </div>

        <!-- ক্লিন ফিনিশিং -->
        <div class="separator">***</div>

    </div> <!-- 3D অ্যানিমেশন ফ্রেম শেষ -->

</body>
</html>
