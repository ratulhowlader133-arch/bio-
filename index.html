<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratul Howlader — Cosmic Odyssey</title>
    <style>
        /* Global Reset & Pro Cinematic Environment */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #020204;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1600px; /* Golden-ratio 3D depth focal point */
        }

        /* 👑 High-End Video Production Background Container */
        .video-bg-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -2;
            overflow: hidden;
            background: #010103;
        }

        .video-bg-wrapper video {
            width: 100%; height: 100%;
            object-fit: cover; /* Ensures real screen scale without distortion */
            pointer-events: none;
        }

        /* 🎨 Hollywood Color-Grading & Peripheral Vignette Mask */
        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(2, 2, 5, 0.2) 30%, #020205 100%),
                        linear-gradient(180deg, rgba(2,2,5,0.4) 0%, rgba(2,2,5,0.1) 50%, rgba(2,2,5,0.6) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* Minimalist Premium HUD */
        .cyber-hud {
            position: absolute;
            top: 40px; left: 50%;
            transform: translateX(-50%) translateZ(80px);
            font-family: SFMono-Regular, Consolas, monospace;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 6px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 24px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            z-index: 10;
        }

        /* 3D Framework Grid */
        .matrix-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            width: 90%;
            max-width: 1200px;
            transform-style: preserve-3d;
            z-index: 1;
            padding: 140px 0 80px 0;
            will-change: transform;
        }

        /* ✨ Premium Frosted Obsidian Glass Cards (Isolates beautifully from the real space video) */
        .cyber-card {
            background: rgba(13, 14, 18, 0.75); /* High-contrast matte dark skin */
            backdrop-filter: blur(40px); /* Massive Apple-style glass refraction behind the card */
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-top: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 55px 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
            color: #fff;
            position: relative;
            transform-style: preserve-3d;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.85),
                        inset 0 1px 1px rgba(255, 255, 255, 0.04);
            transition: background 0.4s, border-color 0.4s, box-shadow 0.4s, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            
            /* Professional Micro-Floating Motion */
            animation: spatialDrift 8s ease-in-out infinite;
        }

        /* Asynchronous Phase Breaks */
        .c-1 { animation-delay: 0s; }
        .c-2 { animation-delay: -3.2s; }
        .c-3 { animation-delay: -1.6s; }
        .c-4 { animation-delay: -4.8s; }
        .c-5 { animation-delay: -2.4s; }

        @keyframes spatialDrift {
            0%, 100% { transform: translateY(0px) rotateY(0deg); }
            50% { transform: translateY(-10px) rotateY(0.8deg); }
        }

        /* Clean Micro-interactions on Hover */
        .cyber-card:hover, .cyber-card:active {
            background: rgba(18, 20, 26, 0.85);
            border-color: rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            box-shadow: 0 60px 110px rgba(0, 0, 0, 0.95),
                        0 0 50px rgba(255, 255, 255, 0.03);
            transform: scale(1.03) translateZ(80px) !important;
            animation-play-state: paused;
        }

        /* Structural Design Element ID */
        .card-id {
            font-family: SFMono-Regular, Consolas, monospace;
            font-size: 55px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.02);
            position: absolute;
            top: 15px; left: 25px;
            transform: translateZ(-15px);
            pointer-events: none;
            transition: color 0.4s;
        }
        .cyber-card:hover .card-id, .cyber-card:active .card-id {
            color: rgba(255, 255, 255, 0.04);
        }

        /* Elegant High-Contrast Typography */
        .card-title {
            font-size: 25px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 14px;
            color: #ffffff;
            transform: translateZ(30px);
        }

        .card-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            font-family: SFMono-Regular, Consolas, monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            transform: translateZ(15px);
            transition: color 0.3s;
        }
        .cyber-card:hover .card-desc, .cyber-card:active .card-desc {
            color: #ffffff;
        }

        /* Social Connection Panels */
        .social-hub {
            display: flex;
            gap: 12px;
            margin-top: 22px;
            transform: translateZ(45px);
            flex-wrap: wrap;
            justify-content: center;
            max-width: 340px;
        }

        .social-link-btn {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-family: SFMono-Regular, Consolas, monospace;
            font-size: 11px;
            font-weight: 500;
            padding: 10px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .social-link-btn:hover {
            background: #ffffff;
            color: #020204;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        /* Fluid Mobile Breakpoints */
        @media (max-width: 650px) {
            .matrix-container { gap: 24px; padding-top: 120px; }
            .cyber-card { padding: 45px 24px; }
            .card-title { font-size: 22px; }
        }
    </style>
</head>
<body>

    <!-- 🎥 Production-Grade Cinematic Background Video Loop -->
    <div class="video-bg-wrapper">
        <!-- নিচে একটি স্ট্যাবল প্রিমিয়াম মোশন স্পেস ভিডিওর লিংক দেওয়া আছে। তুমি চাইলে তোমার নিজস্ব ডাউনলোড করা ৪K 'space.mp4' ফাইল দিয়ে এই URL টি রিপ্লেস করে নিতে পারো -->
        <video autoplay loop muted playsinline id="spaceVideo">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-stars-in-space-background-1611-large.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <!-- HUD Core Element -->
    <div class="cyber-hud" id="hud-date">CHRONO UNIT // SYNCING</div>

    <!-- 3D Matrix Framework Grid -->
    <div class="matrix-container" id="space-grid">
        
        <!-- 01. About Me -->
        <a href="about.html" class="cyber-card c-1">
            <span class="card-id">01</span>
            <div class="card-title">About Me</div>
            <div class="card-desc">Identity & Core</div>
        </a>

        <!-- 02. Connect -->
        <div class="cyber-card c-2">
            <span class="card-id">02</span>
            <div class="card-title">Connect</div>
            <div class="social-hub">
                <a href="https://www.facebook.com/share/194iqWJxyf/" target="_blank" class="social-link-btn">Facebook</a>
                <a href="https://www.linkedin.com/in/ratul-howladar-82b720418" target="_blank" class="social-link-btn">LinkedIn</a>
                <a href="#" target="_blank" class="social-link-btn">GitHub</a>
                <a href="https://www.instagram.com/judgeroronoa?igsh=MXRzZTZ3eTAzMDF1cg==" target="_blank" class="social-link-btn">Instagram</a>
                <a href="https://wa.me/8801926548174" target="_blank" class="social-link-btn">WhatsApp</a>
                <a href="mailto:ratulhowlader133@gmail.com" class="social-link-btn">Email</a>
            </div>
        </div>

        <!-- 03. Education -->
        <a href="education.html" class="cyber-card c-3">
            <span class="card-id">03</span>
            <div class="card-title">Education</div>
            <div class="card-desc">Academic Timeline</div>
        </a>

        <!-- 04. AI Projects -->
        <a href="ai_projects.html" class="cyber-card c-4">
            <span class="card-id">04</span>
            <div class="card-title">AI Projects</div>
            <div class="card-desc">Intelligence Labs</div>
        </a>

        <!-- 05. Music Bands -->
        <a href="music.html" class="cyber-card c-5">
            <span class="card-id">05</span>
            <div class="card-title">Music Bands</div>
            <div class="card-desc">Sound & Favourites</div>
        </a>

    </div>

    <script>
        // Real-time Epoch/Date HUD Synchronizer
        const dateObj = new Date();
        document.getElementById('hud-date').innerText = `CHRONO CORE // ${dateObj.toISOString().split('T')[0].replace(/-/g, '.')}`;

        // 🧠 Top-Coder Lerp Physics Interactivity Script (Interpolates raw snaps for buttery 3D motion)
        const grid = document.getElementById('space-grid');
        const video = document.getElementById('spaceVideo');
        
        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;

        document.addEventListener('mousemove', (e) => {
            // Relational matrix calculations
            targetX = (window.innerWidth / 2 - e.pageX) / 55;
            targetY = (window.innerHeight / 2 - e.pageY) / 55;
            
            // Video Playback speed ramps up slightly based on user interaction velocity (Creative Director touch)
            if(video) video.playbackRate = 1.6;
        });

        document.addEventListener('mouseleave', () => {
            targetX = 0;
            targetY = 0;
            if(video) video.playbackRate = 1.0;
        });

        // Loop animation applying the mathematical linear interpolation (lerp)
        function smoothRender() {
            // Formula: current = current + (target - current) * easing_factor
            currentX += (targetX - currentX) * 0.08;
            currentY += (targetY - currentY) * 0.08;

            grid.style.transform = `rotateY(${-currentX}deg) rotateX(${currentY}deg)`;
            
            requestAnimationFrame(smoothRender);
        }
        
        smoothRender();
    </script>
</body>
</html>
