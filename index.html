<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratul Howladar</title>
    <style>
        body {
            background-color: #ffffff; /* সাদা ব্যাকগ্রাউন্ড */
            color: #000000;
            font-family: 'Courier New', Courier, monospace;
            padding: 40px;
            font-size: 18px;
            line-height: 1.6;
        }

        h1 {
            font-size: 22px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 25px;
            color: #000000;
            white-space: nowrap; /* নাম এক লাইনে রাখবে */
        }

        /* মেইন ট্রি কন্টেইনার */
        .tree-container {
            position: relative;
            padding-left: 10px;
        }

        .tree, .tree ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        /* প্রধান লম্বালম্বি লাইন */
        .tree {
            position: relative;
        }
        .tree::before {
            content: "";
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 15px;
            width: 1px;
            background-color: #000000;
        }

        .tree li {
            position: relative;
            padding-left: 25px;
            margin-bottom: 15px;
        }

        /* ফোল্ডারগুলোর জন্য আড়াআড়ি লাইন */
        .tree li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 14px;
            width: 20px;
            height: 1px;
            background-color: #000000;
        }

        /* সাব-লিস্ট বা ভেতরের ফাইলগুলোর পজিশন */
        .tree ul {
            position: relative;
            margin-top: 5px;
            padding-left: 5px;
        }

        .tree ul li {
            padding-left: 25px;
            margin-bottom: 5px;
        }

        /* ভেতরের ফাইলের জন্য L-শেপ লাইন */
        .tree ul li::before {
            content: "";
            position: absolute;
            left: 0;
            top: -10px;
            width: 18px;
            height: 24px;
            border-left: 1px solid #000000;
            border-bottom: 1px solid #000000;
        }

        /* ফোল্ডার লিঙ্কের কালার (নীল) */
        .folder-link {
            color: #0000ff;
            text-decoration: underline;
            font-weight: bold;
        }

        /* ফাইল লিঙ্কের কালার (সবুজ) */
        .file-link {
            color: #008000;
            text-decoration: none;
            font-weight: bold;
        }

        .file-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>Ratul Howladar</h1>

    <div class="tree-container">
        <ul class="tree">
            <li>
                <a href="about.html" class="folder-link">about</a>
                <ul>
                    <li><a href="about.html" class="file-link">intro.txt</a></li>
                </ul>
            </li>
            <li>
                <a href="social_media.html" class="folder-link">social_media</a>
                <ul>
                    <li><a href="social_media.html" class="file-link">facebook.txt</a></li>
                    <li><a href="social_media.html" class="file-link">instagram.txt</a></li>
                    <li><a href="social_media.html" class="file-link">linkedin.txt</a></li>
                </ul>
            </li>
            <li>
                <a href="education.html" class="folder-link">education</a>
                <ul>
                    <li><a href="education.html" class="file-link">degree.txt</a></li>
                </ul>
            </li>
            <li>
                <a href="music.html" class="folder-link">music</a>
                <ul>
                    <li><a href="music.html" class="file-link">genres.txt</a></li>
                    <li><a href="music.html" class="file-link">artists.txt</a></li>
                    <li><a href="music.html" class="file-link">tracks.txt</a></li>
                </ul>
            </li>
            <li>
                <a href="ai_projects.html" class="folder-link">ai_projects</a>
            </li>
            <li>
                <a href="contact.html" class="folder-link">contact</a>
                <ul>
                    <li><a href="contact.html" class="file-link">details.txt</a></li>
                </ul>
            </li>
        </ul>
    </div>

</body>
</html>
