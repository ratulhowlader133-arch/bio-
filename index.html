            backdrop-filter: blur(25px); /* Real-time refraction physics */
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.06);

            border-radius: 24px;
            padding: 55px 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
            color: #fff;
            position: relative;
            transform-style: preserve-3d;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.85),
                        inset 0 1px 1px rgba(255, 255, 255, 0.03);
            transition: background 0.4s, border-color 0.4s, box-shadow 0.4s, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            
            /* High-End Architectural Micro Drifting Motion */
            animation: spatialDrift 8s ease-in-out infinite;

        /* Async Phase Modulation to stop synchronized robotic swaying */
        .c-1 { animation-delay: 0s; }
        .c-2 { animation-delay: -3.2s; }
        .c-3 { animation-delay: -1.6s; }
        .c-4 { animation-delay: -4.8s; }
        .c-5 { animation-delay: -2.4s; }

        @keyframes spatialDrift {
            0%, 100% { transform: translateY(0px) rotateY(0deg); }
            50% { transform: translateY(-10px) rotateY(0.6deg); }
        }

        /* Premium Tactical Hover Responses */
        .cyber-card:hover, .cyber-card:active {
            background: rgba(15, 17, 26, 0.65);
            border-color: rgba(255, 255, 255, 0.35);

                        0 0 40px rgba(255, 255, 255, 0.04);
            transform: scale(1.04) translateZ(80px) !important;
            animation-play-state: paused;
        }

        /* Graphic Element Structural ID */
        .card-id {

            color: rgba(255, 255, 255, 0.015);

            top: 15px; left: 25px;

        }

        /* High-Contrast Typography Framework */
        .card-title {
            font-size: 25px;

        .card-desc {

        /* Social Connection Panels */
        .social-hub {

        /* 📱 Ultimate Mobile Optimization Mesh Layout */

            }

            .cyber-hud { top: 20px; font-size: 8px; padding: 8px 16px; }

    <script>
        // System Time HUD Clock Synchronizer
        const dateObj = new Date();
        document.getElementById('hud-date').innerText = `NASA MATRIX INTERFACE // ${dateObj.toISOString().split('T')[0].replace(/-/g, '.')}`;

        // Interface Rig Interaction Selectors
        const grid = document.getElementById('space-grid');
        
        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;
        let isInteracting = false;

        // Kinetic Vector Calculations (Supports Both Desktop Hover & Mobile Touch Drag)
        function handleInteraction(pointerX, pointerY) {
            targetX = (window.innerWidth / 2 - pointerX) / 45;
            targetY = (window.innerHeight / 2 - pointerY) / 45;
        }

        document.addEventListener('mousemove', (e) => {
            handleInteraction(e.pageX, e.pageY);
        });

        // 📱 Touch Engine Framework for Mobile Core
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                handleInteraction(e.touches[0].pageX, e.touches[0].pageY);
                isInteracting = true;
            }
        }, { passive: true });

        document.addEventListener('touchend', () => { isInteracting = false; });
        document.addEventListener('mouseleave', () => { targetX = 0; targetY = 0; });

        // 🚀 ADVANCED NASA-SPECIFIC 3D GRAPHICS PIPELINE (THREE.JS CODES)
        let scene, camera, renderer, accretionDisk, asteroidField;
        const totalParticles = 2800; // Perfect balanced computational weight
        const totalAsteroids = 35; // Pure 3D objects with mesh properties

        function initNasaEngine() {
            // 1. Structural Scene & Spatial Focal Mechanics
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.z = 700;

            // 2. High-Performance WebGL Shader Allocator
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('nasaViewport'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // 3. 💡 Blender Style Lighting Rig Installation
            // Specular light mapping to dynamically shade real 3D assets floating around
            const ambientLight = new THREE.AmbientLight(0x0a0a1a, 1.5);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x8a4fff, 3, 1200); // Cinematic Volumetric Purple
            pointLight.position.set(200, 100, 300);
            scene.add(pointLight);

            const directionalLight = new THREE.DirectionalLight(0x4f9eff, 1.5); // Deep Blue Spatial Glow
            directionalLight.position.set(-300, 200, -100);
            scene.add(directionalLight);

            // 4. 🌀 Procedural 3D Accretion Spiral Disk (True Universe Coordinates)
            const particleGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(totalParticles * 3);
            const colors = new Float32Array(totalParticles * 3);

            const colorCenter = new THREE.Color(0xffffff); // Core hyper-bright mass
            const colorEdge = new THREE.Color(0x3d115c);   // Outer space dust accretion color

            for (let i = 0; i < totalParticles; i++) {
                // Mathematical Spiral Layout Generation Formulas
                const i3 = i * 3;
                const radius = Math.random() * 800 + 50;
                const spinAngle = radius * 0.012;
                const branchAngle = ((i % 4) * 2 * Math.PI) / 4; // 4 Dimensional spiral quadrants

                const randomX = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * 45;
                const randomY = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * 45;
                const randomZ = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * 45;

                positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
                positions[i3 + 1] = randomY; // Kept narrow for realistic disc flatness
                positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

                // Color interpolation based on relative depth density (Closer to center = brighter core)
                const mixedColor = colorCenter.clone();
                mixedColor.lerp(colorEdge, radius / 850);

                colors[i3] = mixedColor.r;
                colors[i3 + 1] = mixedColor.g;
                colors[i3 + 2] = mixedColor.b;
            }

            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const particleMaterial = new THREE.PointsMaterial({
                size: 2.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.75,
                blending: THREE.AdditiveBlending, // Simulates absolute energy emissive properties
                sizeAttenuation: true
            });

            accretionDisk = new THREE.Points(particleGeometry, particleMaterial);
            accretionDisk.rotation.x = Math.PI * 0.22; // Cinematic tilt angle matching NASA standard
            scene.add(accretionDisk);

            // 5. 🪨 Blender Mesh Infrastructure: Floating 3D Asteroid Fields
            asteroidField = new THREE.Group();
            // Blender style mesh primitives with real structural indices
            const asteroidGeometry = new THREE.IcosahedronGeometry(12, 1); 
            const asteroidMaterial = new THREE.MeshStandardMaterial({
                color: 0x1f2230,
                roughness: 0.85,
                metalness: 0.3,
                flatShading: true // Gives a rocky, faceted Blender mesh finish
            });

            for (let i = 0; i < totalAsteroids; i++) {
                const mesh = new THREE.Mesh(asteroidGeometry, asteroidMaterial);
                
                // Distribute structural debris randomly in volumetric space box
                mesh.position.set(
                    (Math.random() - 0.5) * 1400,
                    (Math.random() - 0.5) * 800,
                    (Math.random() - 0.5) * 1000
                );

                // Randomized sizes to scale vector profiles
                const scale = Math.random() * 1.5 + 0.3;
                mesh.scale.set(scale, scale, scale);
                
                // Track discrete spin values directly inside object memory profile
                mesh.userData = {
                    spinX: Math.random() * 0.015,
                    spinY: Math.random() * 0.015
                };

                asteroidField.add(mesh);
            }
            scene.add(asteroidField);
        }

        // 🧠 Real-Time Physics Calculus Engine (Mathematical Frame Easing Loop)
        let clock = new THREE.Clock();

        function computationalLoop() {
            const elapsedTime = clock.getElapsedTime();

            // 1. UI Matrix Interpolation Interpolator (Buttery Soft Lerp)
            currentX += (targetX - currentX) * 0.07;
            currentY += (targetY - currentY) * 0.07;
            grid.style.transform = `rotateY(${-currentX}deg) rotateX(${currentY}deg)`;

            // 2. Camera Viewport Physics Trajectory Logic
            // Baseline continuous cosmological movement if user stops active interaction
            if (!isInteracting && targetX === 0) {
                const autoOrbitX = Math.sin(elapsedTime * 0.15) * 8;
                const autoOrbitY = Math.cos(elapsedTime * 0.1) * 5;
                camera.position.x += (autoOrbitX - camera.position.x) * 0.03;
                camera.position.y += (autoOrbitY - camera.position.y) * 0.03;
            } else {
                camera.position.x += (targetX * 20 - camera.position.x) * 0.05;
                camera.position.y += (-targetY * 20 - camera.position.y) * 0.05;
            }
            camera.lookAt(scene.position);

            // 3. 🌀 Accretion Disk Rotation Velocity
            accretionDisk.rotation.y = elapsedTime * 0.04;

            // 4. 🪨 Asteroid Field Micro Axial Kinematics
            asteroidField.children.forEach(asteroid => {
                asteroid.rotation.x += asteroid.userData.spinX;
                asteroid.rotation.y += asteroid.userData.spinY;
                
                // Minor orbital float deviation paths
                asteroid.position.y += Math.sin(elapsedTime + asteroid.position.x) * 0.08;
            });

            renderer.render(scene, camera);
            requestAnimationFrame(computationalLoop);
        }

        // Elastic Viewport Re-Projection Grid Matrix
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize Core System Pipelines
        initNasaEngine();
        computationalLoop();
    </script>
