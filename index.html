    <style>

        .tree {
            list-style-type: none;

        }

        .tree li {

            padding-left: 25px;
            margin: 5px 0;

        }

        /* লম্বালম্বি লাইন এবং এরো */

            content: "";
            position: absolute;
            left: 28px;
            top: 60px;
            bottom: 20px;
            width: 1px;
            background: #000000;
        }

        .tree li::before {
            content: "└── ";
            position: absolute;
            left: 0;
        }

        a {
            color: #00008b;
            text-decoration: none;
            font-weight: bold;
        }
