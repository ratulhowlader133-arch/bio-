<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratul Howladar — Core Directory</title>
    <style>
        body {
            /* কালারফুল এআই আভা দেওয়ার জন্য ডিপ ভায়োলেট ও সায়ান-ব্লু মিক্সড গ্রেডিয়েন্ট */
            background: radial-gradient(circle at top left, #1c0024, transparent 60%),
                        radial-gradient(circle at bottom right, #001a33, transparent 60%),
                        #000000; /* বেস পিচ ব্ল্যাক */
            background-attachment: fixed;
            color: #e0e0e0;
            font-family: 'Georgia', serif;
            padding: 50px 25px 80px 25px;
            max-width: 460px; /* লাইন লেন্থ লক */
            margin: 0 auto;
            line-height: 1.8;
            font-size: 20px; /* জুম ফিক্সড - একদম স্পষ্ট আর বড় দেখাবে */
            position: relative;
            z-index: 1;
        }

        /* হোয়াইট অ্যান্ড ব্ল্যাক গথিক এসভিজি ওয়াটারমার্ক */
        .gothic-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0.04; 
            pointer-events: none;
            user-select: none;
        }

        /* টপ লেভেল কোডার সিস্টেম ড্যাশবোর্ড বার */
        .sys-dashboard {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 11px;
            color: #666666;
            border-bottom: 1px solid #222222;
            padding-bottom: 8px;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .sys-status-active {
            color: #00ff66; /* প্রো গ্রিন অ্যাকসেন্ট */
        }

        h1 {
            font-size: 28px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 5px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 14px;
            color: #888888;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        /* অ্যাডভান্সড ডিরেক্টরি ট্রি স্ট্রাকচার */
        .tree-container {
            margin: 30px 0 50px 0;
            line-height: 1.9;
        }

        .tree-root {
            font-family: monospace;
            color: #aaaaaa;
            font-size: 16px;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
        }

        /* ব্লিংকিং টার্মিনাল কার্সার অ্যানিমেশন */
        @keyframes blink {
            50% { opacity: 0; }
        }
        .cursor {
            animation: blink 1s infinite;
            color: #00f3ff;
            font-weight: bold;
        }

        .tree-line {
            margin-bottom: 8px;
            font-family: monospace;
            white-space: nowrap;
        }

        .tree-char {
            color: #444444;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .tree-folder {
            color: #888888;
            font-weight: bold;
            font-family: monospace;
            font-size: 17px;
        }

        /* মেটাডেটা ট্যাগ (ফাইলের সাইজ) */
        .file-meta {
            font-size: 12px;
            color: #555555;
            font-family: monospace;
            margin-left: 6px;
        }

        a {
            color: #4da6ff; /* অ্যাসথেটিক ইলেকট্রিক ব্লু */
            text-decoration: underline;
            font-family: 'Georgia', serif;
            font-size: 20px;
        }

        a:hover {
            color: #80bfff;
        }

        /* ক্লিন মিনিমাল সেপারেটর */
        .separator {
            text-align: center;
            margin-top: 50px;
            color: #333333;
            letter-spacing: 5px;
        }

        /* রেসপনসিভ জুম প্রোটেকশন */
        @media (max-width: 600px) {
            body {
                padding: 50px 20px 60px 20px;
                font-size: 19px;
            }
            .tree-line a {
                font-size: 19px;
            }
        }
    </style>
</head>
<body>

    <!-- হোয়াইট অ্যান্ড *ব্ল্যাক গথিক এসভিজি ওয়াটারমার্ক ব্যাকগ্রাউন্ড -->
    <div class="gothic-watermark">
        <svg width="100%" height="100%" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
            <path d="M 400,50 L 400,750 M 100,320 L 700,320" stroke="#ffffff" stroke-width="2" />
            <polygon points="400,100 460,320 400,700 340,320" fill="none" stroke="#ffffff" stroke-width="1.5" />
            <circle cx="400" cy="320" r="120" fill="none" stroke="#ffffff" stroke-width="1.5" />
            <circle cx="400" cy="320" r="200" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="6,6" />
            <path d="M 400,320 L 230,150 M 400,320 L 570,150 M 400,320 L 230,490 M 400,320 L 570,490" stroke="#ffffff" stroke-width="1" />
        </svg>
    </div>

    <!-- সিস্টেম ড্যাশবোর্ড মেটাডেটা বার -->
    <div class="sys-dashboard">
        <div>SYS: <span class="sys-status-active">ONLINE</span></div>
        <div>LOC: DHAKA // BD</div>
        <div>2026.06.26</div>
    </div>

        <div class="tree-line"><span class="tree-char">├── </span><span class="tree-folder">connect/</span></div>
        <div class="tree-line"><span class="tree-char">│   └── </span><a href="social_media.html">socials.html</a><span class="file-meta">[4.2kb]</span></div>
        
        <div class="tree-line"><span class="tree-char">├── </span><span class="tree-folder">archive/</span></div>
        <div class="tree-line"><span class="tree-char">│   └── </span><a href="education.html">education.html</a><span class="file-meta">[5.1kb]</span></div>

</body>
</html>
